<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuzzFinder — 제휴지면 탐색기</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f6f8;
  --header-bg: #fff;
  --border: #e8eaed;
  --text-1: #0f1117;
  --text-2: #6b7280;
  --text-3: #9ca3af;
  --accent: #E8352A;
  --accent-hover: #c22821;
  --blue: #2563eb;
  --blue-light: #eff6ff;
  --panel-width: 264px;
  --ss-h: 280px;
  --ss-w: 130px;
  --header-h: 56px;
  --cat-h: 44px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
[hidden] { display: none !important; }

body {
  font-family: 'Inter', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */
.header {
  position: sticky; top: 0; z-index: 200;
  height: var(--header-h);
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px; gap: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}

.logo {
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0; text-decoration: none; color: inherit;
}
.logo-icon {
  width: 30px; height: 30px;
  background: var(--accent); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 900; font-size: 15px; font-style: italic;
}
.logo-text { font-size: 17px; font-weight: 800; color: var(--text-1); letter-spacing: -.3px; }
.logo-text span { color: var(--accent); }
.logo-sub { font-size: 11px; color: var(--text-3); font-weight: 500; margin-left: 6px; }

.search-wrap {
  flex: 1; max-width: 480px;
  display: flex; align-items: center; gap: 10px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 0 14px; height: 36px;
  transition: border-color .15s, box-shadow .15s;
}
.search-wrap:focus-within {
  border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.1);
}
.search-wrap svg { color: var(--text-3); flex-shrink: 0; }
#search-input {
  flex: 1; border: none; background: transparent; outline: none;
  font-size: 13.5px; color: var(--text-1); font-family: inherit;
}
#search-input::placeholder { color: var(--text-3); }
#search-clear {
  border: none; background: none; cursor: pointer; color: var(--text-3);
  padding: 2px; border-radius: 50%; display: flex; align-items: center;
  transition: color .1s;
}
#search-clear:hover { color: var(--text-1); }

.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.sel-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--blue-light); border-radius: 10px;
  padding: 6px 12px; font-size: 13px;
}
#sel-count { font-weight: 700; color: var(--blue); }
.dl-btn {
  background: var(--blue); color: #fff;
  border: none; border-radius: 8px; padding: 7px 16px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background .15s, transform .1s;
  font-family: inherit;
}
.dl-btn:hover { background: #1d4ed8; transform: translateY(-1px); }
.dl-btn:active { transform: translateY(0); }
.dl-btn:disabled { background: #c7d2fe; cursor: not-allowed; transform: none; }
.clear-sel {
  border: none; background: none; color: var(--text-2); cursor: pointer;
  font-size: 12px; padding: 6px 8px; border-radius: 6px;
  font-family: inherit; transition: background .1s;
}
.clear-sel:hover { background: #f3f4f6; color: var(--text-1); }

/* ─── CATEGORY BAR ─── */
.cat-bar-outer {
  position: sticky; top: var(--header-h); z-index: 190;
  background: var(--header-bg); border-bottom: 1px solid var(--border);
}
.cat-bar {
  display: flex; overflow-x: auto; gap: 0;
  padding: 0 20px; height: var(--cat-h);
  scrollbar-width: none;
}
.cat-bar::-webkit-scrollbar { display: none; }
.cat-btn {
  display: flex; align-items: center; gap: 5px;
  border: none; background: none; cursor: pointer;
  padding: 0 14px; height: 100%; white-space: nowrap;
  font-size: 13px; font-weight: 500; color: var(--text-2);
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color .15s, border-color .15s;
  font-family: inherit; flex-shrink: 0;
}
.cat-btn:hover { color: var(--text-1); }
.cat-btn.active { color: var(--text-1); font-weight: 700; border-bottom-color: var(--accent); }
.cat-cnt {
  background: #f0f2f5; color: var(--text-3);
  font-size: 11px; font-weight: 600; padding: 1px 6px;
  border-radius: 20px; min-width: 22px; text-align: center;
}
.cat-btn.active .cat-cnt { background: #fde8e7; color: var(--accent); }

.cat-featured { gap: 5px; }
.cat-featured .featured-star { color: #f59e0b; font-size: 13px; }
.cat-featured.active { border-bottom-color: #f59e0b; }
.cat-featured.active .cat-cnt { background: #fffbeb; color: #b45309; }
.cat-featured.active .featured-star { color: #f59e0b; }

/* ─── MAIN ─── */
.main { padding: 0; }
.results-bar {
  padding: 12px 20px; font-size: 12.5px; color: var(--text-3);
  font-weight: 500; border-bottom: 1px solid var(--border);
  background: var(--header-bg);
}
.results-bar strong { color: var(--text-1); }

/* ─── APP ROW ─── */
.app-row {
  display: flex; background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.app-row:hover { background: #fafbff; }
.app-row:last-child { border-bottom: none; }

/* LEFT PANEL */
.app-panel {
  width: var(--panel-width); flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 20px 20px 20px 20px;
  display: flex; flex-direction: column; gap: 14px;
  align-self: stretch;
}

.app-head { display: flex; align-items: flex-start; gap: 12px; }
.app-icon {
  width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900; color: rgba(255,255,255,.95);
  box-shadow: 0 2px 8px rgba(0,0,0,.15); letter-spacing: -1px;
}
.app-name-wrap { flex: 1; min-width: 0; }
.app-name {
  font-size: 16px; font-weight: 800; color: var(--text-1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.3;
}
.cat-badge {
  display: inline-block; margin-top: 4px;
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 20px;
}

/* category badge color map — applied via JS class */
.cat-금융 { background: #eff6ff; color: #1d4ed8; }
.cat-쇼핑 { background: #fff7ed; color: #c2410c; }
.cat-라이프스타일 { background: #f0fdf4; color: #15803d; }
.cat-육아 { background: #fdf4ff; color: #a21caf; }
.cat-엔터테인먼트 { background: #fff1f2; color: #be123c; }
.cat-뉴스미디어 { background: #f0f9ff; color: #0369a1; }
.cat-게임 { background: #fefce8; color: #a16207; }
.cat-음식배달 { background: #fff7ed; color: #ea580c; }
.cat-여행 { background: #f0fdfa; color: #0f766e; }
.cat-건강피트니스 { background: #ecfdf5; color: #059669; }
.cat-교육 { background: #f5f3ff; color: #7c3aed; }
.cat-소셜커뮤니티 { background: #eff6ff; color: #2563eb; }
.cat-오픈마켓 { background: #fef9c3; color: #a16207; }
.cat-부동산 { background: #fdf2f8; color: #db2777; }
.cat-교통모빌리티 { background: #f0f9ff; color: #0284c7; }
.cat-음악오디오 { background: #f5f3ff; color: #7c3aed; }
.cat-스포츠 { background: #fff7ed; color: #b45309; }
.cat-만화웹툰 { background: #fef2f2; color: #dc2626; }
.cat-날씨 { background: #e0f2fe; color: #0369a1; }
.cat-기타 { background: #f3f4f6; color: #374151; }

.app-meta { display: flex; flex-direction: column; gap: 8px; }
.meta-row { display: flex; flex-direction: column; gap: 2px; }
.meta-label { font-size: 10.5px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .4px; }
.meta-val {
  font-size: 13px; color: var(--text-1); line-height: 1.4;
  word-break: keep-all;
}
.meta-val.empty { color: var(--text-3); font-style: italic; }
.meta-val.manager { font-weight: 600; color: var(--blue); }

.app-actions {
  display: flex; gap: 6px; margin-top: auto; padding-top: 4px;
}
.sel-all-btn {
  flex: 1; height: 32px; border: 1.5px solid var(--border); background: #fff;
  border-radius: 7px; font-size: 12px; font-weight: 600; color: var(--text-2);
  cursor: pointer; font-family: inherit; transition: all .12s;
}
.sel-all-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
.sel-all-btn.all-selected { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }
.app-dl-btn {
  flex: 1; height: 32px;
  background: var(--bg); border: 1.5px solid var(--border); color: var(--text-3);
  border-radius: 7px; font-size: 12px; font-weight: 600; cursor: not-allowed;
  font-family: inherit; transition: all .12s;
}
.app-dl-btn.has-sel {
  background: var(--blue); border-color: var(--blue); color: #fff;
  cursor: pointer; box-shadow: 0 2px 8px rgba(37,99,235,.3);
}
.app-dl-btn.has-sel:hover { background: #1d4ed8; }

/* RIGHT — SCREENSHOTS AREA */
.ss-area {
  flex: 1; min-width: 0;
  overflow-x: auto; overflow-y: visible;
  padding: 24px 20px;
  display: flex; align-items: center; gap: 10px;
  scrollbar-width: thin; scrollbar-color: #d1d5db transparent;
  scroll-behavior: smooth;
}
.ss-area::-webkit-scrollbar { height: 4px; }
.ss-area::-webkit-scrollbar-track { background: transparent; }
.ss-area::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

/* SCREENSHOT ITEM */
.ss-item {
  position: relative; flex-shrink: 0;
  width: var(--ss-w); height: var(--ss-h);
  border-radius: 16px; overflow: hidden;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,.1);
  border: 2px solid transparent;
  transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, border-color .15s;
}
.ss-item:hover {
  transform: scale(1.05) translateY(-3px);
  box-shadow: 0 12px 32px rgba(0,0,0,.18);
  z-index: 5;
}
.ss-item.selected {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(37,99,235,.25);
}
.ss-item img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  border-radius: 14px;
}

/* CHECKBOX OVERLAY */
.ss-check-wrap {
  position: absolute; top: 7px; right: 7px; z-index: 10;
  opacity: 0; transition: opacity .15s;
}
.ss-item:hover .ss-check-wrap,
.ss-item.selected .ss-check-wrap { opacity: 1; }
.ss-checkbox { display: none; }
.ss-check-box {
  width: 22px; height: 22px;
  background: rgba(255,255,255,.85);
  border: 2px solid #fff;
  border-radius: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .12s;
}
.ss-item.selected .ss-check-box {
  background: var(--blue); border-color: var(--blue);
}
.ss-check-icon {
  display: none; color: #fff;
  width: 12px; height: 12px;
}
.ss-item.selected .ss-check-icon { display: block; }

/* PLACEHOLDER SCREEN */
.ss-placeholder-inner {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; padding: 16px 10px 10px;
  gap: 7px;
}
.ph-bar {
  height: 7px; border-radius: 4px;
  background: rgba(255,255,255,.35); flex-shrink: 0;
}
.ph-bar.w80 { width: 80%; }
.ph-bar.w60 { width: 60%; }
.ph-bar.w45 { width: 45%; }
.ph-bar.w70 { width: 70%; }
.ph-block {
  border-radius: 8px;
  background: rgba(255,255,255,.2); flex-shrink: 0;
  width: 100%;
}
.ph-block.h48 { height: 48px; }
.ph-block.h32 { height: 32px; }
.ph-notch {
  width: 36px; height: 5px; border-radius: 3px;
  background: rgba(0,0,0,.2); margin-bottom: 6px; flex-shrink: 0;
}
.ph-home {
  width: 32px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,.4); margin-top: auto; flex-shrink: 0;
}
.ss-badge-preparing {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.5); color: #fff;
  font-size: 9.5px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
  white-space: nowrap; backdrop-filter: blur(4px);
}

/* ─── LIGHTBOX ─── */
.lightbox {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.lb-bg {
  position: absolute; inset: 0;
  background: rgba(5, 7, 15, .88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  cursor: pointer;
}
.lb-inner {
  position: relative; z-index: 1;
  display: flex; align-items: center; gap: 20px;
}
.lb-img-wrap {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
  background: #111;
  max-height: 72vh;
  max-width: 60vw;
  display: flex; align-items: center; justify-content: center;
}
#lb-img {
  display: block;
  max-height: 72vh;
  max-width: 60vw;
  width: auto; height: auto;
  object-fit: contain;
  border-radius: 18px;
  transition: opacity .2s;
}
.lb-nav {
  width: 48px; height: 48px; border-radius: 50%;
  background: rgba(255,255,255,.15); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, transform .1s;
  backdrop-filter: blur(8px); flex-shrink: 0;
}
.lb-nav:hover { background: rgba(255,255,255,.28); transform: scale(1.08); }
.lb-nav svg { color: #fff; }
.lb-nav:disabled { opacity: .3; cursor: not-allowed; transform: none; }
.lb-footer {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px;
}
.lb-meta { display: flex; flex-direction: column; gap: 2px; }
.lb-app-name { font-size: 16px; font-weight: 700; color: #fff; }
.lb-counter { font-size: 12.5px; color: rgba(255,255,255,.55); }
.lb-dl {
  background: #fff; color: var(--text-1);
  border: none; border-radius: 9px; padding: 8px 18px;
  font-size: 13.5px; font-weight: 700; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 7px;
  transition: background .12s, transform .1s;
  box-shadow: 0 2px 12px rgba(0,0,0,.2);
}
.lb-dl:hover { background: #f0f9ff; transform: translateY(-1px); }
.lb-close {
  position: absolute; top: 18px; right: 20px; z-index: 3;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.12); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 16px;
  transition: background .12s, transform .1s;
  backdrop-filter: blur(6px);
}
.lb-close:hover { background: rgba(255,255,255,.22); transform: scale(1.1); }

/* thumbnail strip */
.lb-strip {
  position: absolute; bottom: 72px; left: 0; right: 0; z-index: 2;
  display: flex; justify-content: center; gap: 6px; padding: 8px 20px;
  background: linear-gradient(to top, rgba(0,0,0,.5) 0%, transparent 100%);
}
.lb-thumb {
  width: 38px; height: 54px; border-radius: 6px;
  overflow: hidden; cursor: pointer; opacity: .5;
  border: 2px solid transparent;
  transition: opacity .15s, border-color .15s;
  flex-shrink: 0;
}
.lb-thumb img { width: 100%; height: 100%; object-fit: cover; }
.lb-thumb.active { opacity: 1; border-color: #fff; }
.lb-thumb:hover { opacity: .85; }

/* ─── EMPTY STATE ─── */
.empty-state {
  padding: 80px 24px; text-align: center;
  background: var(--header-bg);
}
.empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-title { font-size: 18px; font-weight: 700; color: var(--text-1); margin-bottom: 8px; }
.empty-sub { font-size: 14px; color: var(--text-3); }

/* ─── ANIMATIONS ─── */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.app-row { animation: fadeInUp .25s ease both; }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="header">
  <div class="logo">
    <div class="logo-icon">B</div>
    <div class="logo-text">Buzz<span>Finder</span></div>
    <div class="logo-sub">제휴지면 탐색기</div>
  </div>

  <div class="search-wrap">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="앱 이름으로 검색..." autocomplete="off">
    <button id="search-clear" class="search-clear" hidden aria-label="지우기">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <div class="header-right">
    <div id="sel-pill" class="sel-pill" hidden>
      <span id="sel-count">0</span>장 선택됨
      <button id="global-dl" class="dl-btn">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        다운로드
      </button>
      <button id="clear-sel" class="clear-sel">전체 해제</button>
    </div>
  </div>
</header>

<!-- ═══ CATEGORY BAR ═══ -->
<div class="cat-bar-outer">
  <div class="cat-bar" id="cat-bar"></div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="results-bar" id="results-bar"></div>
<main class="main">
  <div id="app-list"></div>
  <div id="empty-state" class="empty-state" hidden>
    <div class="empty-icon">🔍</div>
    <p class="empty-title">검색 결과가 없습니다</p>
    <p class="empty-sub">다른 검색어나 카테고리를 시도해보세요.</p>
  </div>
</main>

<!-- ═══ LIGHTBOX ═══ -->
<div id="lightbox" class="lightbox" hidden>
  <div class="lb-bg" id="lb-bg"></div>
  <button class="lb-close" id="lb-close">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
  </button>
  <div class="lb-inner">
    <button class="lb-nav" id="lb-prev">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div class="lb-img-wrap">
      <img id="lb-img" src="" alt="">
    </div>
    <button class="lb-nav" id="lb-next">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>
  <div class="lb-strip" id="lb-strip"></div>
  <div class="lb-footer">
    <div class="lb-meta">
      <div class="lb-app-name" id="lb-app-name"></div>
      <div class="lb-counter" id="lb-counter"></div>
    </div>
    <button class="lb-dl" id="lb-dl">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      이미지 저장
    </button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════════

let currentCat = '전체';
let searchQuery = '';

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════

function getColor(id) {
  return PALETTE[id % PALETTE.length];
}

function catClass(cat) {
  return 'cat-' + cat.replace(/[·\s\/]/g, '');
}

function filteredApps() {
  return ALL_APPS.filter(app => {
    const catOk = currentCat === '전체'
      || currentCat === '주요 매체' && FEATURED_IDS.has(app.id)
      || app.category === currentCat;
    const q = searchQuery.trim().toLowerCase();
    const qOk = !q || app.name.toLowerCase().includes(q);
    return catOk && qOk;
  });
}

function catCount(cat) {
  if (cat === '전체') return ALL_APPS.length;
  if (cat === '주요 매체') return FEATURED_IDS.size;
  return ALL_APPS.filter(a => a.category === cat).length;
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════

function renderCatBar() {
  const bar = document.getElementById('cat-bar');
  bar.innerHTML = ['주요 매체', '전체', ...CATEGORIES].map(cat => {
    const active = cat === currentCat ? 'active' : '';
    const cnt = catCount(cat);
    if (cnt === 0) return '';
    const isFeatured = cat === '주요 매체';
    return `<button class="cat-btn ${active} ${isFeatured ? 'cat-featured' : ''}" data-cat="${cat}">
      ${isFeatured ? '<span class="featured-star">★</span>' : ''}${cat} <span class="cat-cnt">${cnt}</span>
    </button>`;
  }).join('');
  bar.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      renderAll();
    });
  });
}

function renderResultsBar(apps) {
  const bar = document.getElementById('results-bar');
  const q = searchQuery.trim();
  if (q) {
    bar.innerHTML = `<strong>${apps.length}개</strong> 매체에서 "<strong>${q}</strong>" 검색 결과`;
  } else if (currentCat === '주요 매체') {
    bar.innerHTML = `★ <strong>주요 매체</strong> ${apps.length}개`;
  } else if (currentCat !== '전체') {
    bar.innerHTML = `<strong>${apps.length}개</strong> 매체 · ${currentCat}`;
  } else {
    bar.innerHTML = `총 <strong>${apps.length}개</strong> 제휴 매체`;
  }
}

function renderApps(apps) {
  const list = document.getElementById('app-list');
  const empty = document.getElementById('empty-state');
  if (apps.length === 0) {
    list.innerHTML = '';
    empty.hidden = false;
    return;
  }
  empty.hidden = true;
  list.innerHTML = apps.map((app, i) =>
    renderRow(app, i)
  ).join('');
  bindRowEvents();
}

function renderRow(app, delay) {
  const clr = getColor(app.id);
  const hasScreens = app.screenshots && app.screenshots.length > 0;
  const initial = app.name[0];
  const selKey = (idx) => `${app.id}-${idx}`;

  const screensHtml = hasScreens
    ? app.screenshots.map((src, i) => {
        const key = selKey(i);
        const isSel = selected.has(key);
        return `
        <div class="ss-item ${isSel ? 'selected' : ''}"
             data-key="${key}" data-app="${app.id}" data-idx="${i}" data-src="${src}">
          <img src="${src}" alt="${app.name} 스크린샷 ${i+1}" loading="lazy">
          <div class="ss-check-wrap">
            <div class="ss-check-box" data-key="${key}">
              <svg class="ss-check-icon" width="10" height="10" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
          </div>
        </div>`;
      }).join('')
    : genPlaceholders(app);

  // count selected for this app
  const appSelCnt = hasScreens
    ? app.screenshots.filter((_, i) => selected.has(selKey(i))).length : 0;
  const allSel = hasScreens && appSelCnt === app.screenshots.length;

  return `
  <div class="app-row" data-app-id="${app.id}" style="animation-delay:${delay * 30}ms">
    <div class="app-panel">
      <div class="app-head">
        <div class="app-icon" style="background:${clr}">${initial}</div>
        <div class="app-name-wrap">
          <div class="app-name">${app.name}</div>
          <span class="cat-badge ${catClass(app.category)}">${app.category}</span>
        </div>
      </div>
      <div class="app-meta">
        <div class="meta-row">
          <span class="meta-label">진입경로</span>
          <span class="meta-val ${(!app.entryPath || app.entryPath === '-') ? 'empty' : ''}">${app.entryPath || '-'}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">담당자</span>
          <span class="meta-val manager">${app.manager}</span>
        </div>
      </div>
      ${hasScreens ? `
      <div class="app-actions">
        <button class="sel-all-btn ${allSel ? 'all-selected' : ''}" data-app-id="${app.id}">
          ${allSel ? '전체해제' : '전체선택'}
        </button>
        <button class="app-dl-btn ${appSelCnt > 0 ? 'has-sel' : ''}" data-app-id="${app.id}" ${appSelCnt === 0 ? 'disabled' : ''}>
          ${appSelCnt > 0 ? appSelCnt + '장 저장' : '저장'}
        </button>
      </div>` : `
      <div class="app-actions">
        <button class="sel-all-btn" disabled style="opacity:.4;cursor:not-allowed">스크린샷 준비중</button>
      </div>`}
    </div>
    <div class="ss-area">${screensHtml}</div>
  </div>`;
}

function genPlaceholders(app) {
  const clr = getColor(app.id);
  const lighter = clr + 'cc';
  return [0,1,2,3].map(() => `
    <div class="ss-item" style="cursor:default">
      <div class="ss-placeholder-inner" style="background:linear-gradient(160deg,${clr},${lighter})">
        <div class="ph-notch"></div>
        <div class="ph-bar w80"></div>
        <div class="ph-bar w60"></div>
        <div class="ph-block h48"></div>
        <div class="ph-bar w70"></div>
        <div class="ph-block h32"></div>
        <div class="ph-bar w45"></div>
        <div class="ph-home"></div>
      </div>
      <div class="ss-badge-preparing">준비중</div>
    </div>`).join('');
}

function renderAll() {
  const apps = filteredApps();
  renderCatBar();
  renderResultsBar(apps);
  renderApps(apps);
  updateGlobalSel();
}

// ═══════════════════════════════════════════════════════════
//  EVENTS — SCREENSHOT SELECTION
// ═══════════════════════════════════════════════════════════

function bindRowEvents() {
  document.querySelectorAll('.ss-item[data-src]').forEach(item => {
    const src = item.dataset.src;
    const key = item.dataset.key;
    const appId = parseInt(item.dataset.app);
    const idx = parseInt(item.dataset.idx);

    // Checkbox click
    const checkBox = item.querySelector('.ss-check-box');
    if (checkBox) {
      checkBox.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleSelect(key, appId, idx, src, item);
      });
    }

    // Image click → lightbox
    item.addEventListener('click', (e) => {
      if (e.target.closest('.ss-check-wrap')) return;
      openLightbox(appId, idx);
    });
  });

  // Select all buttons
  document.querySelectorAll('.sel-all-btn[data-app-id]').forEach(btn => {
    btn.addEventListener('click', () => toggleSelectAll(parseInt(btn.dataset.appId)));
  });

  // App download buttons
  document.querySelectorAll('.app-dl-btn.has-sel').forEach(btn => {
    btn.addEventListener('click', () => downloadApp(parseInt(btn.dataset.appId)));
  });
}

function toggleSelect(key, appId, idx, src, itemEl) {
  const app = ALL_APPS.find(a => a.id === appId);
  if (selected.has(key)) {
    selected.delete(key);
    itemEl.classList.remove('selected');
  } else {
    selected.set(key, { appId, idx, src, name: app ? app.name : '' });
    itemEl.classList.add('selected');
  }
  refreshRow(appId);
  updateGlobalSel();
}

function toggleSelectAll(appId) {
  const app = ALL_APPS.find(a => a.id === appId);
  if (!app || !app.screenshots) return;

  const keys = app.screenshots.map((_, i) => `${appId}-${i}`);
  const allSelected = keys.every(k => selected.has(k));

  if (allSelected) {
    keys.forEach(k => selected.delete(k));
  } else {
    app.screenshots.forEach((src, i) => {
      selected.set(`${appId}-${i}`, { appId, idx: i, src, name: app.name });
    });
  }
  refreshRow(appId);
  updateGlobalSel();
}

function refreshRow(appId) {
  const app = ALL_APPS.find(a => a.id === appId);
  if (!app || !app.screenshots) return;

  const appSelCnt = app.screenshots.filter((_, i) => selected.has(`${appId}-${i}`)).length;
  const allSel = appSelCnt === app.screenshots.length;

  // Update items
  app.screenshots.forEach((_, i) => {
    const key = `${appId}-${i}`;
    const el = document.querySelector(`.ss-item[data-key="${key}"]`);
    if (el) el.classList.toggle('selected', selected.has(key));
  });

  // Update buttons
  const row = document.querySelector(`.app-row[data-app-id="${appId}"]`);
  if (!row) return;
  const selBtn = row.querySelector('.sel-all-btn');
  const dlBtn = row.querySelector('.app-dl-btn');
  if (selBtn) {
    selBtn.textContent = allSel ? '전체해제' : '전체선택';
    selBtn.classList.toggle('all-selected', allSel);
  }
  if (dlBtn) {
    dlBtn.textContent = appSelCnt > 0 ? `${appSelCnt}장 저장` : '저장';
    dlBtn.classList.toggle('has-sel', appSelCnt > 0);
    dlBtn.disabled = appSelCnt === 0;
    if (appSelCnt > 0) {
      dlBtn.onclick = () => downloadApp(appId);
    }
  }
}

function updateGlobalSel() {
  const pill = document.getElementById('sel-pill');
  const cnt = document.getElementById('sel-count');
  if (selected.size > 0) {
    pill.hidden = false;
    cnt.textContent = selected.size;
  } else {
    pill.hidden = true;
  }
}

// ═══════════════════════════════════════════════════════════
//  DOWNLOAD
// ═══════════════════════════════════════════════════════════

function downloadFiles(items) {
  items.forEach(({ src }, i) => {
    if (!src) return;
    setTimeout(() => {
      const a = document.createElement('a');
      a.href = src;
      a.download = src.split('/').pop();
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }, i * 150);
  });
}

function downloadApp(appId) {
  const items = [...selected.values()].filter(v => v.appId === appId);
  downloadFiles(items);
}

document.getElementById('global-dl').addEventListener('click', () => {
  downloadFiles([...selected.values()]);
});

document.getElementById('clear-sel').addEventListener('click', () => {
  const affectedApps = new Set([...selected.values()].map(v => v.appId));
  selected.clear();
  affectedApps.forEach(id => refreshRow(id));
  updateGlobalSel();
});

// ═══════════════════════════════════════════════════════════
//  LIGHTBOX
// ═══════════════════════════════════════════════════════════

function openLightbox(appId, startIdx) {
  const app = ALL_APPS.find(a => a.id === appId);
  if (!app || !app.screenshots) return;
  lb = { appId, idx: startIdx, screens: app.screenshots };
  document.getElementById('lightbox').hidden = false;
  document.body.style.overflow = 'hidden';
  renderLightbox();
}

function renderLightbox() {
  const app = ALL_APPS.find(a => a.id === lb.appId);
  const src = lb.screens[lb.idx];

  const img = document.getElementById('lb-img');
  img.style.opacity = '0';
  img.src = src;
  img.onload = () => { img.style.opacity = '1'; };
  img.alt = `${app.name} 스크린샷 ${lb.idx + 1}`;

  document.getElementById('lb-app-name').textContent = app.name;
  document.getElementById('lb-counter').textContent = `${lb.idx + 1} / ${lb.screens.length}`;

  document.getElementById('lb-prev').disabled = lb.idx === 0;
  document.getElementById('lb-next').disabled = lb.idx === lb.screens.length - 1;

  // Thumbnail strip
  const strip = document.getElementById('lb-strip');
  strip.innerHTML = lb.screens.map((s, i) => `
    <div class="lb-thumb ${i === lb.idx ? 'active' : ''}" data-idx="${i}">
      <img src="${s}" alt="">
    </div>`).join('');
  strip.querySelectorAll('.lb-thumb').forEach(t => {
    t.addEventListener('click', () => { lb.idx = parseInt(t.dataset.idx); renderLightbox(); });
  });

  // DL button
  document.getElementById('lb-dl').onclick = () => {
    downloadFiles([{ src, appId: lb.appId }]);
  };
}

function closeLightbox() {
  document.getElementById('lightbox').hidden = true;
  document.body.style.overflow = '';
  lb = { appId: null, idx: 0, screens: [] };
}

document.getElementById('lb-prev').addEventListener('click', () => {
  if (lb.idx > 0) { lb.idx--; renderLightbox(); }
});
document.getElementById('lb-next').addEventListener('click', () => {
  if (lb.idx < lb.screens.length - 1) { lb.idx++; renderLightbox(); }
});
document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-bg').addEventListener('click', closeLightbox);

document.addEventListener('keydown', (e) => {
  if (document.getElementById('lightbox').hidden) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft' && lb.idx > 0) { lb.idx--; renderLightbox(); }
  if (e.key === 'ArrowRight' && lb.idx < lb.screens.length - 1) { lb.idx++; renderLightbox(); }
});

// ═══════════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════════

const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  searchClear.hidden = !searchQuery;
  renderAll();
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.hidden = true;
  searchInput.focus();
  renderAll();
});

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════

renderAll();
</script>
</body>
</html>
